<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Medical Q&A</title>
  <style>
    :root { --bg:#f3f6fb; --card:#fff; --text:#0f172a; --muted:#64748b; --accent:#2563eb; }
    body { margin:0; font-family: Inter, system-ui, Arial, sans-serif; background:var(--bg); color:var(--text); }
    .app { max-width: 980px; margin: 0 auto; height: 100vh; display:flex; flex-direction:column; }
    .top { padding:12px 14px; border-bottom:1px solid #e2e8f0; background:#fff; display:flex; justify-content:space-between; align-items:center; }
    .top small { color:var(--muted); }
    #chat { flex:1; overflow:auto; padding:14px; display:flex; flex-direction:column; gap:10px; }
    .msg { max-width:80%; padding:10px 12px; border-radius:12px; line-height:1.45; white-space:normal; word-wrap:break-word; }
    .user { align-self:flex-end; background:#dbeafe; border:1px solid #bfdbfe; }
    .assistant { align-self:flex-start; background:#fff; border:1px solid #e2e8f0; }
    .meta { font-size:12px; color:var(--muted); margin-top:6px; }
    .refs { font-size:12px; color:#334155; margin-top:8px; border-top:1px dashed #cbd5e1; padding-top:8px; }
    .composer { border-top:1px solid #e2e8f0; background:#fff; padding:10px; }
    .row { display:flex; gap:8px; align-items:flex-end; }
    #question { flex:1; min-height:50px; max-height:180px; resize:vertical; border:1px solid #cbd5e1; border-radius:12px; padding:10px; font:inherit; }
    #sendBtn { width:44px; height:44px; border:none; border-radius:999px; background:var(--accent); color:#fff; cursor:pointer; font-size:18px; }
    #sendBtn:disabled { opacity:.6; cursor:not-allowed; }
    #error { display:none; color:#991b1b; background:#fee2e2; border:1px solid #fecaca; border-radius:8px; padding:8px; margin-bottom:8px; }
    h2,h3,h4{margin:.4rem 0}
    ul{margin:.3rem 0 .3rem 1.1rem}
  </style>
</head>
<body>
  <div class="app">
    <div class="top">
      <strong>Medical Q&A</strong>
      <small>Enter = send • Shift+Enter = new line</small>
    </div>

    <div id="chat"></div>

    <div class="composer">
      <div id="error"></div>
      <div class="row">
        <textarea id="question" placeholder="Ask a medical question..."></textarea>
        <button id="sendBtn" title="Send">➤</button>
      </div>
      <div class="meta" id="hint">Evidence and source cards appear with each answer.</div>
    </div>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const questionEl = document.getElementById('question');
    const sendBtn = document.getElementById('sendBtn');
    const errorEl = document.getElementById('error');

    function getAuthToken(){
      try {
        if (window?.app?.settings?.apiKey) return window.app.settings.apiKey;
      } catch {}
      try {
        return sessionStorage.getItem('auth_access_token') || localStorage.getItem('access_token') || '';
      } catch { return ''; }
    }

    function esc(s){ return String(s||'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\'':'&#39;','"':'&quot;'}[c])); }
    function md(s){
      let t=esc(s||'');
      t=t.replace(/^###\s+(.+)$/gm,'<h4>$1</h4>').replace(/^##\s+(.+)$/gm,'<h3>$1</h3>').replace(/^#\s+(.+)$/gm,'<h2>$1</h2>');
      t=t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
      t=t.replace(/^\s*---\s*$/gm,'<hr>');
      t=t.replace(/^\s*[-•]\s+(.+)$/gm,'<li>$1</li>');
      t=t.replace(/(<li>.*<\/li>\n?)+/gs,m=>`<ul>${m}</ul>`);
      return t.replace(/\n\n+/g,'<br><br>').replace(/\n/g,'<br>');
    }

    function addMsg(kind, html){
      const div=document.createElement('div');
      div.className='msg '+kind;
      div.innerHTML=html;
      chat.appendChild(div);
      chat.scrollTop=chat.scrollHeight;
      return div;
    }

    function showError(msg){ errorEl.textContent=msg; errorEl.style.display='block'; }
    function clearError(){ errorEl.style.display='none'; errorEl.textContent=''; }

    async function sendQuestion(){
      const q=(questionEl.value||'').trim();
      if(!q) return;
      const token=getAuthToken();
      if(!token){ showError('Not signed in. Please open from main app session.'); return; }

      clearError();
      addMsg('user', md(q));
      const pending=addMsg('assistant','<em>Generating...</em>');
      sendBtn.disabled=true;

      try{
        const r=await fetch('/api/qa/chat',{method:'POST',headers:{'content-type':'application/json','authorization':'Bearer '+token},body:JSON.stringify({message:q,session_id:'default'})});
        if(!r.ok){ const t=await r.text(); throw new Error(`HTTP ${r.status}: ${t.slice(0,180)}`); }
        const d=await r.json();
        let refs='';
        const src=Array.isArray(d.sources)?d.sources:[];
        const info=`Evidence: RAG ${Number(d.rag_results_count||0)} · Web ${Number(d.web_results_count||0)}${d.evidence_max_year?` · Max year ${d.evidence_max_year}`:''}`;
        if(src.length){
          refs='<div class="refs"><div><strong>'+esc(info)+'</strong></div>'+src.slice(0,8).map((s,i)=>`<div>[${i+1}] ${esc((s.kind||'src').toUpperCase())}: ${esc(s.title||'Untitled')} ${s.url?`<a href="${esc(s.url)}" target="_blank" rel="noopener">link</a>`:''}</div>`).join('')+'</div>';
        } else {
          refs='<div class="refs"><strong>'+esc(info)+'</strong></div>';
        }
        pending.innerHTML=md(d.answer||'No answer returned.')+refs;
        questionEl.value='';
      }catch(e){
        pending.innerHTML='<span style="color:#991b1b">Failed to generate response.</span>';
        showError(e.message||String(e));
      }finally{
        sendBtn.disabled=false;
      }
    }

    questionEl.addEventListener('keydown', (e)=>{
      if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendQuestion(); }
    });
    sendBtn.addEventListener('click', sendQuestion);
  </script>
</body>
</html>
