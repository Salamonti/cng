<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Medical Q&A</title>
  <style>
    :root { --bg:#f3f6fb; --card:#fff; --text:#0f172a; --muted:#64748b; --accent:#2563eb; }
    body { margin:0; font-family: Inter, system-ui, Arial, sans-serif; background:var(--bg); color:var(--text); }
    .app { max-width: 980px; margin: 0 auto; height: 100vh; display:flex; flex-direction:column; }
    .top { padding:12px 14px; border-bottom:1px solid #e2e8f0; background:#fff; display:flex; justify-content:space-between; align-items:center; }
    .top small { color:var(--muted); }
    #chat { flex:1; overflow:auto; padding:14px; display:flex; flex-direction:column; gap:10px; }
    .msg { max-width:80%; padding:10px 12px; border-radius:12px; line-height:1.45; white-space:normal; word-wrap:break-word; }
    .user { align-self:flex-end; background:#dbeafe; border:1px solid #bfdbfe; }
    .assistant { align-self:flex-start; background:#fff; border:1px solid #e2e8f0; }
    .meta { font-size:12px; color:var(--muted); margin-top:6px; }
    .refs { font-size:12px; color:#334155; margin-top:8px; border-top:1px dashed #cbd5e1; padding-top:8px; }
    .msg table{border-collapse:collapse; width:100%; display:block; overflow:auto; font-size:13px;}
    .msg th,.msg td{border:1px solid #d1d5db; padding:6px 8px; text-align:left; white-space:nowrap;}
    .composer { border-top:1px solid #e2e8f0; background:#fff; padding:10px; }
    .row { display:flex; gap:8px; align-items:flex-end; }
    #question { flex:1; min-height:50px; max-height:180px; resize:vertical; border:1px solid #cbd5e1; border-radius:12px; padding:10px; font:inherit; }
    #sendBtn { width:44px; height:44px; border:none; border-radius:999px; background:var(--accent); color:#fff; cursor:pointer; font-size:18px; }
    #sendBtn:disabled { opacity:.6; cursor:not-allowed; }
    #error { display:none; color:#991b1b; background:#fee2e2; border:1px solid #fecaca; border-radius:8px; padding:8px; margin-bottom:8px; }
    h2,h3,h4{margin:.4rem 0}
    ul{margin:.3rem 0 .3rem 1.1rem}
    /* Vision QA additions */
    .thumbnail-container {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 8px 0;
      padding: 8px;
      background: #f8fafc;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
    }
    .thumbnail {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 4px;
    }
    .thumbnail-info {
      flex: 1;
      font-size: 13px;
      line-height: 1.3;
    }
    .thumbnail-info strong {
      display: block;
      margin-bottom: 2px;
    }
    .remove-thumbnail {
      background: none;
      border: none;
      color: #94a3b8;
      font-size: 18px;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
    }
    .remove-thumbnail:hover {
      color: #ef4444;
    }
    .streaming-cursor {
      display: inline-block;
      animation: blink 1s infinite;
    }
    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="top">
      <strong>Medical Q&A</strong>
      <div style="display:flex; gap:8px; align-items:center;">
        <button id="clearChatBtn" style="border:1px solid #cbd5e1;background:#fff;border-radius:8px;padding:6px 10px;cursor:pointer;">Clear chat</button>
        <small>Enter = send • Shift+Enter = new line</small>
      </div>
    </div>

    <div id="chat"></div>

    <div class="composer">
      <div id="error"></div>
      <div class="row">
        <textarea id="question" placeholder="Ask a medical question..."></textarea>
        <label for="fileInput" id="attachBtn" style="width:44px;height:44px;border-radius:999px;border:1px solid #cbd5e1;display:flex;align-items:center;justify-content:center;cursor:pointer;background:#fff;">📎</label>
        <input id="fileInput" type="file" style="display:none" />
        <button id="sendBtn" title="Send">➤</button>
      </div>
      <div class="meta" id="fileMeta"></div>
      <div class="meta" id="hint">Evidence and source cards appear with each answer.</div>
    </div>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const questionEl = document.getElementById('question');
    const sendBtn = document.getElementById('sendBtn');
    const clearChatBtn = document.getElementById('clearChatBtn');
    const fileInput = document.getElementById('fileInput');
    const fileMeta = document.getElementById('fileMeta');
    const errorEl = document.getElementById('error');

    // State for vision QA
    let attachedImage = null;
    let attachedImageUrl = null;
    let currentAbortController = null;

    function getAuthToken(){
      try {
        if (window?.app?.settings?.apiKey) return window.app.settings.apiKey;
      } catch {}
      try {
        return sessionStorage.getItem('auth_access_token') || localStorage.getItem('access_token') || '';
      } catch { return ''; }
    }

    function esc(s){ return String(s||'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\'':'&#39;','"':'&quot;'}[c])); }
    function md(s){
      let t=esc(s||'');
      t=t.replace(/^\s*####\s+(.+)$/gm,'<h5>$1</h5>')
         .replace(/^\s*###\s+(.+)$/gm,'<h4>$1</h4>')
         .replace(/^\s*##\s+(.+)$/gm,'<h3>$1</h3>')
         .replace(/^\s*#\s+(.+)$/gm,'<h2>$1</h2>');
      t=t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
      t=t.replace(/^\s*---\s*$/gm,'<hr>');
      t=t.replace(/^\s*[-•]\s+(.+)$/gm,'<li>$1</li>');
      t=t.replace(/(<li>.*<\/li>\n?)+/gs,m=>`<ul>${m}</ul>`);
            // Basic markdown table support
      const lines = t.split(/\n/);
      const hasPipeRows = lines.some(l => l.includes('|'));
      if (hasPipeRows) {
        const splitCols = (line) => line.replace(/^\s*\|\s*/, '').replace(/\s*\|\s*$/, '').split('|').map(x=>x.trim()).filter(x=>x.length>0);
        const isSep = (line) => /[-:]/.test(line) && line.includes('|');
        let out=[]; let i=0;
        while(i<lines.length){
          const cur = lines[i].trim();
          const nxt = i+1 < lines.length ? lines[i+1].trim() : '';
          if(cur.includes('|') && isSep(nxt)){
            const head=splitCols(cur);
            i+=2; const rows=[];
            while(i<lines.length && lines[i].includes('|')){rows.push(splitCols(lines[i])); i++;}
            let tbl='<table><thead><tr>'+head.map(h=>`<th>${h}</th>`).join('')+'</tr></thead><tbody>';
            for(const r of rows){ tbl+='<tr>'+r.map(c=>`<td>${c}</td>`).join('')+'</tr>'; }
            tbl+='</tbody></table>'; out.push(tbl); continue;
          }
          out.push(lines[i]); i++;
        }
        t=out.join('\n');
      }
      return t.replace(/\n\n+/g,'<br><br>').replace(/\n/g,'<br>');
    }

    function addMsg(kind, html){
      const div=document.createElement('div');
      div.className='msg '+kind;
      div.innerHTML=html;
      chat.appendChild(div);
      chat.scrollTop=chat.scrollHeight;
      return div;
    }

    function addCopyButton(container, plainText){
      const btn=document.createElement('button');
      btn.type='button';
      btn.title='Copy answer';
      btn.textContent='📑';
      btn.style.cssText='margin-top:8px;border:1px solid #cbd5e1;background:#fff;border-radius:8px;padding:4px 8px;cursor:pointer;float:right;';
      btn.addEventListener('click', async ()=>{
        try{ await navigator.clipboard.writeText(plainText||''); btn.textContent='✅'; setTimeout(()=>btn.textContent='📑',900);}catch{}
      });
      container.appendChild(btn);
    }

    function showError(msg){ errorEl.textContent=msg; errorEl.style.display='block'; }
    function clearError(){ errorEl.style.display='none'; errorEl.textContent=''; }

    function removeAttachedImage() {
      if (attachedImageUrl) URL.revokeObjectURL(attachedImageUrl);
      attachedImage = null;
      attachedImageUrl = null;
      fileMeta.textContent = '';
      questionEl.placeholder = 'Ask a medical question...';
    }

    async function extractFileText(file){
      const token=getAuthToken();
      if(!token) throw new Error('Not signed in');
      const name=(file?.name||'').toLowerCase();
      const type=(file?.type||'').toLowerCase();
      const isAudio = type.startsWith('audio/') || /\.(mp3|wav|m4a|ogg|webm)$/i.test(name);
      const isImage = type.startsWith('image/') || /\.(png|jpg|jpeg|webp|bmp|gif)$/i.test(name);
      const isPdf = type==='application/pdf' || /\.pdf$/i.test(name);
      
      if(!isAudio && !isImage && !isPdf) throw new Error('Unsupported file type');
      
      // For images: do NOT extract text; handle in vision QA path
      if (isImage) {
        throw new Error('Images are now handled via vision QA. Upload image and ask your question.');
      }
      
      const fd=new FormData();
      const endpoint=isAudio?'/api/transcribe_diarized':'/api/ocr';
      fd.append(isAudio?'audio':'file', file);
      const r=await fetch(endpoint,{method:'POST',headers:{'authorization':'Bearer '+token},body:fd});
      if(!r.ok){const t=await r.text(); throw new Error(`Extraction failed HTTP ${r.status}: ${t.slice(0,120)}`);}      
      const data=await r.json().catch(()=>({}));
      const text=(data.text||data.transcription||'').toString().trim();
      if(!text) throw new Error('No text extracted');
      return text;
    }

    fileInput.addEventListener('change', async (e)=>{
      const f=e.target.files && e.target.files[0];
      if(!f) return;
      
      const name=f.name.toLowerCase();
      const type=f.type.toLowerCase();
      const isAudio = type.startsWith('audio/') || /\.(mp3|wav|m4a|ogg|webm)$/i.test(name);
      const isImage = type.startsWith('image/') || /\.(png|jpg|jpeg|webp|bmp|gif)$/i.test(name);
      const isPdf = type==='application/pdf' || /\.pdf$/i.test(name);
      
      if (isAudio || isPdf) {
        // Existing OCR/ASR flow
        fileMeta.textContent=`Extracting from: ${f.name}...`;
        try{
          const txt=await extractFileText(f);
          questionEl.value = (questionEl.value ? questionEl.value + '\n\n' : '') + txt;
          fileMeta.textContent=`Attached: ${f.name} · extracted ${txt.length} chars`;
          questionEl.focus();
        }catch(err){
          fileMeta.textContent='';
          showError(err.message||String(err));
        }
      } else if (isImage) {
        // NEW: Store image for vision QA
        attachedImage = f;
        attachedImageUrl = URL.createObjectURL(f);
        
        // Show thumbnail preview
        fileMeta.innerHTML = `
          <div class="thumbnail-container">
            <img src="${attachedImageUrl}" class="thumbnail" alt="Preview">
            <div class="thumbnail-info">
              <strong>Image attached</strong>
              ${esc(f.name)} (${(f.size/1024).toFixed(1)} KB)
            </div>
            <button type="button" class="remove-thumbnail" title="Remove image">×</button>
          </div>
        `;
        
        // Add click handler to remove button
        fileMeta.querySelector('.remove-thumbnail').addEventListener('click', removeAttachedImage);
        
        // Auto‑focus question field with placeholder hint
        questionEl.placeholder = 'Ask about this image...';
        questionEl.focus();
      } else {
        showError('Unsupported file type. Please upload audio, image, or PDF.');
      }
      
      fileInput.value = '';
    });

    async function sendQuestion(){
      const q = (questionEl.value || '').trim();
      const token = getAuthToken();
      
      // If no question but image attached, auto‑generate a generic question
      const effectiveQuestion = q || (attachedImage ? 'Describe this medical image.' : '');
      
      if (!effectiveQuestion) return;
      if (!token) { showError('Not signed in. Please open from main app session.'); return; }

      // Clear UI
      questionEl.value = '';
      clearError();
      addMsg('user', q ? md(q) : (attachedImage ? '<em>[Image question]</em>' : ''));
      const pending = addMsg('assistant', '<em>Analyzing...<span class="streaming-cursor">▌</span></em>');
      sendBtn.disabled = true;
      
      // Cancel any previous request
      if (currentAbortController) currentAbortController.abort();
      currentAbortController = new AbortController();

      try {
        let response;
        
        if (attachedImage) {
          // VISION QA PATH (streaming)
          const formData = new FormData();
          formData.append('question', effectiveQuestion);
          formData.append('image', attachedImage);
          
          response = await fetch('/api/qa/vision', {
            method: 'POST',
            headers: { 'authorization': 'Bearer ' + token },
            body: formData,
            signal: currentAbortController.signal
          });
        } else {
          // REGULAR TEXT QA PATH (non‑streaming)
          response = await fetch('/api/qa/chat', {
            method: 'POST',
            headers: { 
              'content-type': 'application/json',
              'authorization': 'Bearer ' + token 
            },
            body: JSON.stringify({ message: effectiveQuestion, session_id: 'default' }),
            signal: currentAbortController.signal
          });
        }
        
        if (!response.ok) {
          const t = await response.text();
          throw new Error(`HTTP ${response.status}: ${t.slice(0,180)}`);
        }
        
        // Handle streaming response for vision, JSON for regular QA
        if (attachedImage) {
          // Streaming text/plain
          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let answerText = '';
          
          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            
            const chunk = decoder.decode(value, { stream: true });
            answerText += chunk;
            
            // Update UI incrementally
            pending.innerHTML = md(answerText) + '<span class="streaming-cursor">▌</span>';
            chat.scrollTop = chat.scrollHeight;
          }
          
          // Remove blinking cursor when done
          pending.innerHTML = md(answerText);
          addCopyButton(pending, answerText);
          
          // Clear attached image after successful send
          removeAttachedImage();
        } else {
          // Regular JSON response
          const d = await response.json();
          let refs = '';
          const src = Array.isArray(d.sources) ? d.sources : [];
          const info = `Evidence: RAG ${Number(d.rag_results_count||0)} · Web ${Number(d.web_results_count||0)}${d.evidence_max_year?` · Max year ${d.evidence_max_year}`:''}`;
          if (src.length) {
            refs = '<div class="refs"><div><strong>' + esc(info) + '</strong></div>' +
              src.slice(0,8).map((s,i) => 
                `<div>[${i+1}] ${esc((s.kind||'src').toUpperCase())}: ${esc(s.title||'Untitled')} ${s.url?`<a href="${esc(s.url)}" target="_blank" rel="noopener">link</a>`:''}</div>`
              ).join('') + '</div>';
          } else {
            refs = `<div class="refs"><strong>${esc(info)}</strong></div>`;
          }
          const answerText = d.answer || 'No answer returned.';
          pending.innerHTML = md(answerText) + refs;
          addCopyButton(pending, answerText);
        }
      } catch(e) {
        if (e.name === 'AbortError') {
          pending.innerHTML = '<em>Cancelled</em>';
        } else {
          pending.innerHTML = '<span style="color:#991b1b">Failed to generate response.</span>';
          showError(e.message || String(e));
        }
      } finally {
        sendBtn.disabled = false;
        currentAbortController = null;
      }
    }

    questionEl.addEventListener('keydown', (e)=>{
      if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendQuestion(); }
    });
    sendBtn.addEventListener('click', sendQuestion);
    clearChatBtn.addEventListener('click', ()=>{
      chat.innerHTML='';
      questionEl.value='';
      removeAttachedImage();
      clearError();
      questionEl.focus();
    });
    window.addEventListener('load', ()=>{ setTimeout(()=>questionEl.focus(), 50); });
  </script>
</body>
</html>
