<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Medical Q&A</title>
  <style>
    :root { --bg:#f3f6fb; --card:#fff; --text:#0f172a; --muted:#64748b; --accent:#2563eb; }
    body { margin:0; font-family: Inter, system-ui, Arial, sans-serif; background:var(--bg); color:var(--text); }
    .app { max-width: 980px; margin: 0 auto; height: 100vh; display:flex; flex-direction:column; }
    .top { padding:12px 14px; border-bottom:1px solid #e2e8f0; background:#fff; display:flex; justify-content:space-between; align-items:center; }
    .top small { color:var(--muted); }
    #chat { flex:1; overflow:auto; padding:14px; display:flex; flex-direction:column; gap:10px; }
    .msg { max-width:80%; padding:10px 12px; border-radius:12px; line-height:1.45; white-space:normal; word-wrap:break-word; }
    .user { align-self:flex-end; background:#dbeafe; border:1px solid #bfdbfe; }
    .assistant { align-self:flex-start; background:#fff; border:1px solid #e2e8f0; }
    .meta { font-size:12px; color:var(--muted); margin-top:6px; }
    .refs { font-size:12px; color:#334155; margin-top:8px; border-top:1px dashed #cbd5e1; padding-top:8px; }
    .msg table{border-collapse:collapse; width:100%; display:block; overflow:auto; font-size:13px;}
    .msg th,.msg td{border:1px solid #d1d5db; padding:6px 8px; text-align:left; white-space:nowrap;}
    .composer { border-top:1px solid #e2e8f0; background:#fff; padding:10px; }
    .row { display:flex; gap:8px; align-items:flex-end; }
    #question { flex:1; min-height:50px; max-height:180px; resize:vertical; border:1px solid #cbd5e1; border-radius:12px; padding:10px; font:inherit; }
    #sendBtn { width:44px; height:44px; border:none; border-radius:999px; background:var(--accent); color:#fff; cursor:pointer; font-size:18px; }
    #sendBtn:disabled { opacity:.6; cursor:not-allowed; }
    #error { display:none; color:#991b1b; background:#fee2e2; border:1px solid #fecaca; border-radius:8px; padding:8px; margin-bottom:8px; }
    h2,h3,h4{margin:.4rem 0}
    ul{margin:.3rem 0 .3rem 1.1rem}
  </style>
</head>
<body>
  <div class="app">
    <div class="top">
      <strong>Medical Q&A</strong>
      <div style="display:flex; gap:8px; align-items:center;">
        <button id="clearChatBtn" style="border:1px solid #cbd5e1;background:#fff;border-radius:8px;padding:6px 10px;cursor:pointer;">Clear chat</button>
        <small>Enter = send • Shift+Enter = new line</small>
      </div>
    </div>

    <div id="chat"></div>

    <div class="composer">
      <div id="error"></div>
      <div class="row">
        <textarea id="question" placeholder="Ask a medical question..."></textarea>
        <label for="fileInput" id="attachBtn" style="width:44px;height:44px;border-radius:999px;border:1px solid #cbd5e1;display:flex;align-items:center;justify-content:center;cursor:pointer;background:#fff;">📎</label>
        <input id="fileInput" type="file" style="display:none" />
        <button id="sendBtn" title="Send">➤</button>
      </div>
      <div class="meta" id="fileMeta"></div>
      <div class="meta" id="hint">Evidence and source cards appear with each answer.</div>
    </div>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const questionEl = document.getElementById('question');
    const sendBtn = document.getElementById('sendBtn');
    const clearChatBtn = document.getElementById('clearChatBtn');
    const fileInput = document.getElementById('fileInput');
    const fileMeta = document.getElementById('fileMeta');
    const errorEl = document.getElementById('error');

    function getAuthToken(){
      try {
        if (window?.app?.settings?.apiKey) return window.app.settings.apiKey;
      } catch {}
      try {
        return sessionStorage.getItem('auth_access_token') || localStorage.getItem('access_token') || '';
      } catch { return ''; }
    }

    function esc(s){ return String(s||'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\'':'&#39;','"':'&quot;'}[c])); }
    function md(s){
      let t=esc(s||'');
      t=t.replace(/^\s*####\s+(.+)$/gm,'<h5>$1</h5>')
         .replace(/^\s*###\s+(.+)$/gm,'<h4>$1</h4>')
         .replace(/^\s*##\s+(.+)$/gm,'<h3>$1</h3>')
         .replace(/^\s*#\s+(.+)$/gm,'<h2>$1</h2>');
      t=t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
      t=t.replace(/^\s*---\s*$/gm,'<hr>');
      t=t.replace(/^\s*[-•]\s+(.+)$/gm,'<li>$1</li>');
      t=t.replace(/(<li>.*<\/li>\n?)+/gs,m=>`<ul>${m}</ul>`);
            // Basic markdown table support
      const lines = t.split(/\n/);
      const hasPipeRows = lines.some(l => l.includes('|'));
      if (hasPipeRows) {
        const splitCols = (line) => line.replace(/^\s*\|\s*/, '').replace(/\s*\|\s*$/, '').split('|').map(x=>x.trim()).filter(x=>x.length>0);
        const isSep = (line) => /[-:]/.test(line) && line.includes('|');
        let out=[]; let i=0;
        while(i<lines.length){
          const cur = lines[i].trim();
          const nxt = i+1 < lines.length ? lines[i+1].trim() : '';
          if(cur.includes('|') && isSep(nxt)){
            const head=splitCols(cur);
            i+=2; const rows=[];
            while(i<lines.length && lines[i].includes('|')){rows.push(splitCols(lines[i])); i++;}
            let tbl='<table><thead><tr>'+head.map(h=>`<th>${h}</th>`).join('')+'</tr></thead><tbody>';
            for(const r of rows){ tbl+='<tr>'+r.map(c=>`<td>${c}</td>`).join('')+'</tr>'; }
            tbl+='</tbody></table>'; out.push(tbl); continue;
          }
          out.push(lines[i]); i++;
        }
        t=out.join('\n');
      }
      return t.replace(/\n\n+/g,'<br><br>').replace(/\n/g,'<br>');
    }

    function addMsg(kind, html){
      const div=document.createElement('div');
      div.className='msg '+kind;
      div.innerHTML=html;
      chat.appendChild(div);
      chat.scrollTop=chat.scrollHeight;
      return div;
    }

    function addCopyButton(container, plainText){
      const btn=document.createElement('button');
      btn.type='button';
      btn.title='Copy answer';
      btn.textContent='📑';
      btn.style.cssText='margin-top:8px;border:1px solid #cbd5e1;background:#fff;border-radius:8px;padding:4px 8px;cursor:pointer;float:right;';
      btn.addEventListener('click', async ()=>{
        try{ await navigator.clipboard.writeText(plainText||''); btn.textContent='✅'; setTimeout(()=>btn.textContent='📑',900);}catch{}
      });
      container.appendChild(btn);
    }

    function showError(msg){ errorEl.textContent=msg; errorEl.style.display='block'; }
    function clearError(){ errorEl.style.display='none'; errorEl.textContent=''; }

    

    async function extractFileText(file){
      const token=getAuthToken();
      if(!token) throw new Error('Not signed in');
      const name=(file?.name||'').toLowerCase();
      const type=(file?.type||'').toLowerCase();
      const isAudio = type.startsWith('audio/') || /\.(mp3|wav|m4a|ogg|webm)$/i.test(name);
      const isImageOrPdf = type.startsWith('image/') || type==='application/pdf' || /\.(pdf|png|jpg|jpeg|webp|heic)$/i.test(name);
      if(!isAudio && !isImageOrPdf) throw new Error('Unsupported file type');
      const fd=new FormData();
      const endpoint=isAudio?'/api/transcribe_diarized':'/api/ocr';
      fd.append(isAudio?'audio':'file', file);
      const r=await fetch(endpoint,{method:'POST',headers:{'authorization':'Bearer '+token},body:fd});
      if(!r.ok){const t=await r.text(); throw new Error(`Extraction failed HTTP ${r.status}: ${t.slice(0,120)}`);}      
      const data=await r.json().catch(()=>({}));
      const text=(data.text||data.transcription||'').toString().trim();
      if(!text) throw new Error('No text extracted');
      return text;
    }

    fileInput.addEventListener('change', async (e)=>{
      const f=e.target.files && e.target.files[0];
      if(!f) return;
      fileMeta.textContent=`Extracting from: ${f.name}...`;
      try{
        const txt=await extractFileText(f);
        questionEl.value = (questionEl.value ? questionEl.value + '\n\n' : '') + txt;
        fileMeta.textContent=`Attached: ${f.name} · extracted ${txt.length} chars`;
        questionEl.focus();
      }catch(err){
        fileMeta.textContent='';
        showError(err.message||String(err));
      }finally{
        fileInput.value='';
      }
    });

    async function sendQuestion(){
      const q=(questionEl.value||'').trim();
      if(!q) return;
      const token=getAuthToken();
      if(!token){ showError('Not signed in. Please open from main app session.'); return; }

      // Clear immediately on send (industry-standard chat behavior)
      questionEl.value='';
      clearError();
      addMsg('user', md(q));
      const pending=addMsg('assistant','<em>Generating...</em>');
      sendBtn.disabled=true;

      try{
        const r=await fetch('/api/qa/chat',{method:'POST',headers:{'content-type':'application/json','authorization':'Bearer '+token},body:JSON.stringify({message:q,session_id:'default'})});
        if(!r.ok){ const t=await r.text(); throw new Error(`HTTP ${r.status}: ${t.slice(0,180)}`); }
        const d=await r.json();
        let refs='';
        const src=Array.isArray(d.sources)?d.sources:[];
        const info=`Evidence: RAG ${Number(d.rag_results_count||0)} · Web ${Number(d.web_results_count||0)}${d.evidence_max_year?` · Max year ${d.evidence_max_year}`:''}`;
        if(src.length){
          refs='<div class="refs"><div><strong>'+esc(info)+'</strong></div>'+src.slice(0,8).map((s,i)=>`<div>[${i+1}] ${esc((s.kind||'src').toUpperCase())}: ${esc(s.title||'Untitled')} ${s.url?`<a href="${esc(s.url)}" target="_blank" rel="noopener">link</a>`:''}</div>`).join('')+'</div>';
        } else {
          refs='<div class="refs"><strong>'+esc(info)+'</strong></div>';
        }
        const answerText = d.answer||'No answer returned.';
        pending.innerHTML=md(answerText)+refs;
        addCopyButton(pending, answerText);
      }catch(e){
        pending.innerHTML='<span style="color:#991b1b">Failed to generate response.</span>';
        showError(e.message||String(e));
      }finally{
        sendBtn.disabled=false;
      }
    }

    questionEl.addEventListener('keydown', (e)=>{
      if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendQuestion(); }
    });
    sendBtn.addEventListener('click', sendQuestion);
    clearChatBtn.addEventListener('click', ()=>{ chat.innerHTML=''; questionEl.value=''; fileMeta.textContent=''; clearError(); questionEl.focus(); });
    window.addEventListener('load', ()=>{ setTimeout(()=>questionEl.focus(), 50); });
  </script>
</body>
</html>
