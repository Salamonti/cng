# C:\RAG\settings.yaml
# where we persist the vector store
persist_directory: "./chroma_store"


corpus_version: 1
# chunking
chunk_size_chars: 1800         # ~500-900 tokens for guidelines ~ OK
chunk_overlap_chars: 200

# retrieval
bm25_candidates: 50
dense_top_k: 16
final_top_k: 10

# rerank (optional—enabled later)
use_reranker: false
use_rrf: true
rrf_k: 60
use_diversify_cap: true
diversify_cap_limit: 3
use_mmr: false
mmr_lambda: 0.7
use_windowing: false
use_adaptive_lambda: false
use_micro_retry: false

# metadata freshness (informational only in Step 1)
stale_days_threshold: 365

# model
embedding_model: "jinaai/jina-embeddings-v5-text-nano"
# Jina v5 supports Matryoshka embeddings: 768 (full), 512, 256, 128, 64, 32
# To enable Matryoshka truncation, set env var EMBEDDER_DIM=512 (or 256, 128...)
# Leave unset or 0 to use full native dimension (768)
# IMPORTANT: All embeddings (indexing + queries) must use the same dimension

# ranking and context tuning
hybrid_lambda: 0.10
keyword_overlap_lambda: 0.15
max_chunks_per_doc: 2
summarize_threshold_words: 700
summary_target_words: 220
